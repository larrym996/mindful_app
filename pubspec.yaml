name: mindful_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.8+1

environment:
  sdk: ^3.11.3

dependencies:
  dart_snmp: ^3.0.1
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  http: ^1.6.0
  multicast_dns: ^0.3.3
  nsd: ^5.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sembast: ^3.8.6
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0


flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_icons:
  image_path: "assets/icon/icon.png"
  android: true
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true

    

